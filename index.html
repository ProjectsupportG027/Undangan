<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Naruto & Hinata Wedding Invitation</title>

    <meta name="description"
          content="Wedding Invitation Naruto Uzumaki & Hinata Hyuga">

    <!-- Google Font -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap"

<body>

<!-- ===================================== -->
<!-- BACKGROUND MUSIC -->
<!-- ===================================== -->

<audio id="bgMusic" loop>

</audio>

<!-- COVER -->
<!-- ===================================== -->

<section id="cover">

    <div class="overlay"></div>

        <span>&</span>

        <h1>Hinata</h1>

        <p>

            21 Desember 2026

        </p>

        <div class="guest-box">

            <p>Kepada Yth.</p>

            <h3 id="guestName">

                Bapak / Ibu / Saudara/i

            </h3>

        </div>

        <button id="openInvitation">

            💌 Buka Undangan

        </button>

    </div>

</section>

<!-- ===================================== -->
<!-- OPENING -->
<!-- ===================================== -->

<section id="opening">

    <div class="container">

        <h2>Opening</h2>

    </div>

</section>

<!-- ===================================== -->
<!-- COUPLE -->
<!-- ===================================== -->

<section id="couple">

    <div class="container">

        <h2>Bride & Groom</h2>

    </div>

</section>

<!-- ===================================== -->
<!-- STORY -->
<!-- ===================================== -->

<section id="story">

        <h2>Love Story</h2>

    </div>

</section>

<!-- ===================================== -->
<!-- EVENT -->
<!-- ===================================== -->

<section id="event">

    <div class="container">

        <h2>Wedding Event</h2>

    </div>

</section>

<!-- ===================================== -->
<!-- GALLERY -->
<!-- ===================================== -->

<section id="gallery">

    <div class="container">

        <h2>Gallery</h2>

    </div>

</section>

<!-- ===================================== -->
<!-- GIFT -->
<!-- ===================================== -->

<section id="gift">

    <div class="container">

        <h2>Wedding Gift</h2>

    </div>

</section>

<!-- ===================================== -->
<!-- WISHES -->
<!-- ===================================== -->

<section id="wishes">

    <div class="container">

        <h2>Ucapan & Doa</h2>

    </div>

</section>

<!-- ===================================== -->
<!-- CLOSING -->
<!-- ===================================== -->

<section id="closing">

    <div class="container">

        <h2>Terima Kasih</h2>

<!-- ===================================== -->
<!-- FOOTER -->
<!-- ===================================== -->

<footer>

    <p>

        © 2026 Naruto & Hinata Wedding Invitation
